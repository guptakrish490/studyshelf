<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyShelf-Track your Study resources and progress</title>
    <link rel="stylesheet" href="/studyshelf/studyshelf/css/styles.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&display=swap');
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <div class="img">
                <img src="/studyshelf/studyshelf/assets/logo.svg">
            </div>
            <div class="nameofLogo">
                <h2>StudyShelf</h2>
            </div>
        </div>
    </header>

    <main>
        <div class="top"> 
            <div class="searchbar">
                <img src="/studyshelf/studyshelf/assets/searchbutton.svg">
                <input type="text" placeholder="Search resources....">
            </div>
        </div>
        <div class="topics">
            <div class="sidebar">
                All subjects list here...
            </div>
            <div class="container">
                <div class="item1 items">Subject1 in detail</div>
                <div class="item2 items">Subject2 in detail</div>
                <div class="item3 items">Subject3 in detail</div>
                <div class="item4 items">Subject4 in detail</div>
                <div class="item5 items">Subject5 in detail</div>
                <div class="item6 items">Subject6 in detail</div>
                <div class="item7 items">Subject7 in detail</div>
                <div class="item8 items">Subject8 in detail</div>
            </div>
        </div>
    </main>

    <footer>
        <div class="addnew">
            <button>+</button>
        </div>
    </footer>
    
</body>
</html>
