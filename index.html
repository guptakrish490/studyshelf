<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyShelf-Track your Study resources and progress</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/card.css">
    <link rel="stylesheet" href="css/form.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Mona+Sans:ital,wght@0,200..900;1,200..900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&family=Roboto+Slab:wght@100..900&display=swap');
    </style>
</head>

<body>
    <div id="overlay">

        <!-- form starts here -->

        <form action="index.html" id="formContainer" style="display: none">

            <h2>Add New Subject</h2>
            <span>Subject Name:</span><input id="subject" type="text" placeholder="Enter Subject Name" required>
            <span>Resources:</span>
            <div id="subjectInput" class="subjectInput">
                <select id="selectDropdown">
                    <option selected disabled value="Select a Category">Select a Category</option aria-required>
                    <option value="Class Notes">Class Notes</option>
                    <option value="Assignments">Assignments</option>
                    <option value="PYQs">PYQs</option>
                    <option value="Others">Others</option>
                </select>
                <input id="title" type="text" placeholder="Enter Title" required>
                <input id="link" type="text" placeholder="Paste your G-drive #Link here" required>
            </div>

            <div id="formButtons">
                <button type="button" id="cancelSave">Cancel</button>
                <button type="submit" id="saveButton">Save</button>
            </div>

        </form>

        <!-- form for subject edit -->
        <form action="index.html" class="editSubject" id="editSubject" style="display: none;">
            <h3>Edit Subject</h3>
            <div class="inputEditSubject">
                <span>Subject Name:</span><input type="text" class="newSubjectName" placeholder="Enter Subject Name" required>
            </div>
            <button id="saveEditSubject">Save</button>
        </form>
        <!-- form ends here -->

        <!-- for for edit category -->
        <form action="index.html" class="editCategory" id="editCategory" style="display: none;">
            <h3>Edit Category</h3>
            <div class="inputEditCategory">
                <span>Category Name:</span><input name="newCategoryName" type="text" class="newCategoryName" placeholder="Enter Category Name">
            </div>

            <div class="inputEditCategory">
                <span>Or select one:</span><select name="newCategory" id="selectCategoryNew">
                    <option selected disabled value="Select a Category">Select a Category</option aria-required>
                    <option value="Class Notes">Class Notes</option>
                    <option value="Assignments">Assignments</option>
                    <option value="PYQs">PYQs</option>
                    <option value="Practice Papers">Practice Papers</option>
                    <option value="Projects">Projects</option>
                    <option value="Others">Others</option>
                </select>
            </div>
            <button id="saveEditCategory">Save</button>
        </form>
        <!--  -->

        <!-- form ends here -->

        
    </div>
    




    <!-- navbar part starts here -->
        <header>
            <div class="logo">
                <div class="logoImg">
                    <img src="assets/logo.svg">
                </div>
                <div class="nameofLogo">
                    <h2>StudyShelf</h2>
                </div>
            </div>
        </header>
    <!-- navbar part ends here -->


    <!-- main section starts here -->
    <main>
            <!-- search bar here -->
            <div class="searchbar">
                <img src="assets/searchbutton.svg">
                <input name="searched" type="text" placeholder="Search resources....">
            </div>
            <!-- search bar ends here -->


            <div id=cardContainer class="cardContainer">
                <p>No Resources to Display...</p>
                <button id="addResources">+ Add Resources</button>
            </div>
    </main>
    <!-- main section ends here -->


    <!-- fixed add button -->
    <button id="addnew" draggable="true">
        <img id="addNewBtn" src="assets/addNewBtn.svg">
    </button>
    <!-- fixed add button ends here -->

    
    <script src="js/form.js" defer></script>
    <script src="js/dashboard.js"></script>


</body>

</html>
