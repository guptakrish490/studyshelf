<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyShelf-Track your Study resources and progress</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&display=swap');
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <div class="img">
                <img src="/assets/logo.svg">
            </div>
            <div class="nameofLogo">
                <h2>StudyShelf</h2>
            </div>
        </div>
        <div class="rightnav">
            <div class="profileicon">
                <img src="/assets/profileicon.svg">
                <a href="blank">profile</a>
            </div>
            <div class="settingsicon">
                <img src="/assets/settingsicon.svg">
                <a href="blank">settings</a>
            </div>
        </div>
    </header>

    <main>
        <div class="top">
            <div class="firstline">
                <!-- <div class="hamburgericon">
                    <img src="/assets/hamburgermenu.svg">
                </div> -->
                <div class="menuname">
                    <h2>My Courses</h2>
                </div>
                <div class="options">
                    <div class="option1 op">
                        <button>COURSES</button>
                    </div>
                    <div class="option2 op">
                        <button>CALENDAR</button>
                    </div>
                </div>
            </div>
            <div class="secondline">
                <div class="searchbar">
                    <input type="text" placeholder="Search">
                </div>
            </div>
        </div>
        <div class="container">
            <div class="item1 items">Subject1</div>
            <div class="item2 items">Subject2</div>
            <div class="item3 items">Subject3</div>
            <div class="item4 items">Subject4</div>
            <div class="item5 items">Subject5</div>
            <div class="item6 items">Subject6</div>
            <div class="item7 items">Subject7</div>
            <div class="item8 items">Subject8</div>
        </div>
    </main>


    <footer>
        <ul>
            <li><a href="blank">Home</a></li>
            <li><a href="blank">Resources</a></li>
            <li><a href="blank">Grades</a></li>
            <li><a href="blank">Profile</a></li>
        </ul>
    </footer>
    
</body>
</html>
